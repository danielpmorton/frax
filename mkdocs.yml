site_name: "frax"
site_description: "Fast Robot Kinematics and Dynamics in JAX"
site_url: "https://danielpmorton.github.io/frax"
repo_url: "https://github.com/danielpmorton/frax"
repo_name: "danielpmorton/frax"
site_dir: "site"

plugins:
- search
- mkdocstrings:
    default_handler: python
    handlers:
      python:
        options:
          show_root_heading: true
          show_source: true
          inherited_members: true
          members_order: "source"

nav:
- Home: 
  - index.md
  - Guides:
    - Modeling Collision Geometry: modeling_collision.md
- API Reference:
  - Core:
    - "Robot": api/robot.md

theme:
  name: material
  logo: logo.svg
  features:
  - announce.dismiss
  - content.action.edit
  - content.action.view
  - content.code.annotate
  - content.code.copy
  - content.tooltips
  - navigation.footer
  - navigation.indexes
  - navigation.sections
  - navigation.tabs
  - navigation.tabs.sticky
  - navigation.top
  - search.highlight
  - search.suggest
  - toc.follow
  palette:
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: black
    accent: lime
    toggle:
      icon: material/weather-sunny
      name: Switch to light mode
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: teal
    accent: purple
    toggle:
      icon: material/weather-night
      name: Switch to dark mode
  favicon: favicon.png

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.snippets:
      base_path: [!relative $config_dir]
      check_paths: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
